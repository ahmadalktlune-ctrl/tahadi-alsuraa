function log(msg, type='info') {
  const el = document.getElementById('log');
  el.innerHTML += `<div class="${type}">${msg}</div>`;
  el.scrollTop = el.scrollHeight;
}

async function uploadInChunks(collectionName, entries, chunkSize) {
  let total = 0;
  for (let i = 0; i < entries.length; i += chunkSize) {
    const batch = db.batch();
    const chunk = entries.slice(i, i + chunkSize);
    chunk.forEach(([id, data]) => {
      batch.set(db.collection(collectionName).doc(id), data);
    });
    await batch.commit();
    total += chunk.length;
    log(`✅ ${collectionName}: رُفع ${total} من ${entries.length}`, 'success');
  }
  return total;
}

async function uploadIQ() {
  log('⏳ جاري رفع أسئلة IQ...', 'info');
  try {
    const entries = Object.entries(IQ_QUESTIONS);
    const total = await uploadInChunks('iq_questions', entries, 450);
    log('🎉 تم رفع ' + total + ' سؤال IQ بنجاح!', 'success');
  } catch(e) {
    log('❌ خطأ: ' + e.message, 'error');
  }
}

async function uploadQuestions() {
  log('⏳ جاري رفع بنك الأسئلة الرئيسي...', 'info');
  try {
    const entries = Object.entries(QUESTIONS);
    const total = await uploadInChunks('questions', entries, 450);
    log('🎉 تم رفع ' + total + ' سؤال بنجاح!', 'success');
  } catch(e) {
    log('❌ خطأ: ' + e.message, 'error');
  }
}

async function uploadAll() {
  await uploadIQ();
  await uploadQuestions();
  log('🎉 اكتمل رفع كل شي!', 'success');
}
