<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
<meta name="theme-color" content="#0b1020" />
<title>Script Bot — سكربت بوت</title>
<style>
  :root{
    --bg:#0b1020; --bg2:#111834; --card:#151d3b; --card2:#1b244a;
    --text:#eaf0ff; --muted:#9aa6d4; --line:#26305c;
    --accent:#6d8bff; --accent2:#a06bff; --good:#2fd27a; --warn:#ffb23e; --bad:#ff5c72;
    --code-bg:#0c1226; --radius:16px; --shadow:0 12px 40px rgba(0,0,0,.35);
  }
  :root[data-theme="light"]{
    --bg:#eef2fb; --bg2:#e6ecf9; --card:#ffffff; --card2:#f3f6ff;
    --text:#141a33; --muted:#5a6690; --line:#dbe2f5;
    --accent:#3f5bd6; --accent2:#7c3aed; --good:#12a35a; --warn:#c77700; --bad:#d63a52;
    --code-bg:#0c1226; --shadow:0 10px 34px rgba(30,50,120,.12);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:radial-gradient(1200px 700px at 80% -10%, rgba(160,107,255,.18), transparent 60%),
               radial-gradient(1000px 600px at -10% 10%, rgba(109,139,255,.18), transparent 55%),
               var(--bg);
    color:var(--text);
    font-family:"Segoe UI",Tahoma,system-ui,-apple-system,"Helvetica Neue",Arial,"Noto Sans Arabic",sans-serif;
    min-height:100vh; line-height:1.6;
  }
  a{color:var(--accent);text-decoration:none}
  .container{max-width:1100px;margin:0 auto;padding:0 16px}

  /* Header */
  header.appbar{
    position:sticky;top:0;z-index:50;
    background:linear-gradient(180deg, rgba(11,16,32,.92), rgba(11,16,32,.72));
    backdrop-filter:blur(10px);
    border-bottom:1px solid var(--line);
  }
  :root[data-theme="light"] header.appbar{background:linear-gradient(180deg, rgba(255,255,255,.92), rgba(255,255,255,.72))}
  .appbar .row{display:flex;align-items:center;gap:12px;padding:12px 16px;flex-wrap:wrap}
  .brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:20px;cursor:pointer;user-select:none}
  .brand .logo{
    width:38px;height:38px;border-radius:11px;display:grid;place-items:center;font-size:20px;
    background:linear-gradient(135deg,var(--accent),var(--accent2));box-shadow:0 6px 18px rgba(109,139,255,.5)
  }
  .brand small{display:block;font-weight:500;font-size:11px;color:var(--muted);letter-spacing:.5px}
  nav.tabs{display:flex;gap:6px;margin-inline-start:auto;flex-wrap:wrap}
  nav.tabs button, .iconbtn{
    background:var(--card);border:1px solid var(--line);color:var(--text);
    padding:9px 14px;border-radius:11px;cursor:pointer;font-size:14px;font-weight:600;transition:.15s
  }
  nav.tabs button:hover,.iconbtn:hover{border-color:var(--accent);transform:translateY(-1px)}
  nav.tabs button.active{background:linear-gradient(135deg,var(--accent),var(--accent2));border-color:transparent;color:#fff}
  .iconbtn{padding:9px 12px}

  /* Hero */
  .hero{padding:46px 0 22px;text-align:center}
  .hero h1{font-size:clamp(28px,5vw,46px);margin:0 0 10px;line-height:1.15;
    background:linear-gradient(120deg,var(--text),var(--accent));-webkit-background-clip:text;background-clip:text;color:transparent}
  .hero p{color:var(--muted);font-size:clamp(15px,2.2vw,19px);max-width:680px;margin:0 auto 18px}
  .hero .cta{display:inline-flex;gap:10px;flex-wrap:wrap;justify-content:center}
  .btn{
    border:none;cursor:pointer;font-weight:700;font-size:15px;padding:12px 22px;border-radius:13px;transition:.15s;
    background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 8px 22px rgba(109,139,255,.35)
  }
  .btn:hover{transform:translateY(-2px);box-shadow:0 12px 28px rgba(109,139,255,.5)}
  .btn.ghost{background:var(--card);color:var(--text);border:1px solid var(--line);box-shadow:none}
  .btn.small{padding:9px 15px;font-size:13px;border-radius:11px}
  .btn.good{background:linear-gradient(135deg,#2fd27a,#12a35a)}
  .btn.warn{background:linear-gradient(135deg,#ffb23e,#ff7a2f)}

  .stats{display:flex;gap:22px;justify-content:center;flex-wrap:wrap;margin-top:22px;color:var(--muted)}
  .stats .s b{color:var(--text);font-size:22px;display:block}
  .stats .s span{font-size:13px}

  /* Filters */
  .filters{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin:26px 0 6px}
  .chip{
    background:var(--card);border:1px solid var(--line);color:var(--muted);
    padding:8px 15px;border-radius:999px;cursor:pointer;font-size:13.5px;font-weight:600;transition:.15s
  }
  .chip:hover{color:var(--text);border-color:var(--accent)}
  .chip.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border-color:transparent}

  /* Cards grid */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;margin:22px 0 60px}
  .tcard{
    background:linear-gradient(180deg,var(--card),var(--card2));
    border:1px solid var(--line);border-radius:var(--radius);padding:18px;cursor:pointer;
    transition:.18s;position:relative;overflow:hidden;display:flex;flex-direction:column;gap:8px
  }
  .tcard:hover{transform:translateY(-4px);border-color:var(--accent);box-shadow:var(--shadow)}
  .tcard .ic{font-size:30px}
  .tcard h3{margin:2px 0 0;font-size:18px}
  .tcard p{margin:0;color:var(--muted);font-size:13.5px;flex:1}
  .tcard .tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
  .tag{font-size:11px;padding:3px 9px;border-radius:999px;background:var(--bg2);border:1px solid var(--line);color:var(--muted);font-weight:600}
  .tag.tg{color:#5eb3ff;border-color:#2a4d78}
  .tag.wa{color:#43d97f;border-color:#1f5c3a}
  .tag.sc{color:#ffb45e;border-color:#6b4a1f}
  .tag.py{color:#ffd15e}
  .tag.js{color:#f7df6e}

  /* Builder */
  .panel{background:linear-gradient(180deg,var(--card),var(--card2));border:1px solid var(--line);border-radius:var(--radius);padding:22px;margin:22px 0}
  .panel h2{margin:0 0 4px;font-size:22px}
  .panel .sub{color:var(--muted);margin:0 0 16px;font-size:14px}
  .field{margin:14px 0}
  .field label{display:block;font-weight:700;margin-bottom:6px;font-size:14px}
  .field .hint{color:var(--muted);font-size:12.5px;font-weight:400;margin-inline-start:6px}
  .field input,.field textarea,.field select{
    width:100%;background:var(--bg2);border:1px solid var(--line);color:var(--text);
    padding:11px 13px;border-radius:11px;font-size:14px;font-family:inherit;transition:.15s
  }
  .field input:focus,.field textarea:focus,.field select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(109,139,255,.18)}
  .field textarea{min-height:84px;resize:vertical}
  .segrow{display:flex;flex-wrap:wrap;gap:16px}
  .segrow .field{flex:1;min-width:180px;margin:8px 0}
  .seg{display:flex;gap:6px;flex-wrap:wrap}
  .seg button{
    background:var(--bg2);border:1px solid var(--line);color:var(--text);padding:9px 15px;border-radius:11px;
    cursor:pointer;font-weight:700;font-size:13.5px;transition:.15s;display:flex;align-items:center;gap:6px
  }
  .seg button:hover{border-color:var(--accent)}
  .seg button.active{background:linear-gradient(135deg,var(--accent),var(--accent2));border-color:transparent;color:#fff}
  .seg button:disabled{opacity:.35;cursor:not-allowed}
  .actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}

  /* Result */
  .result{margin-top:6px}
  .codehead{display:flex;align-items:center;gap:8px;flex-wrap:wrap;background:var(--bg2);border:1px solid var(--line);border-bottom:none;border-radius:12px 12px 0 0;padding:9px 12px}
  .codehead .fname{font-weight:700;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:13px;color:var(--muted)}
  .codehead .sp{margin-inline-start:auto;display:flex;gap:8px;flex-wrap:wrap}
  pre.code{
    margin:0;background:var(--code-bg);border:1px solid var(--line);border-radius:0 0 12px 12px;
    padding:16px;overflow:auto;max-height:520px;font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
    font-size:13px;line-height:1.65;direction:ltr;text-align:left;color:#d7e0ff
  }
  /* syntax colors */
  .tok-com{color:#6b7aa8;font-style:italic}
  .tok-str{color:#7ee0a0}
  .tok-key{color:#c58bff;font-weight:700}
  .tok-num{color:#ffcf6b}
  .tok-fn{color:#6fb7ff}

  .explain{background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:16px 18px;margin-top:16px}
  .explain h4{margin:0 0 10px;font-size:16px;display:flex;align-items:center;gap:8px}
  .explain ol{margin:0;padding-inline-start:20px}
  .explain li{margin:7px 0;color:var(--text)}
  .explain code{background:var(--code-bg);padding:2px 7px;border-radius:6px;font-family:ui-monospace,monospace;font-size:12.5px;color:#8fd3ff;direction:ltr;display:inline-block}
  .note{border-inline-start:3px solid var(--warn);padding:8px 12px;background:rgba(255,178,62,.08);border-radius:8px;margin-top:10px;font-size:13.5px;color:var(--muted)}

  .runout{margin-top:12px;background:#05070f;border:1px solid var(--line);border-radius:12px;padding:0;overflow:hidden}
  .runout .rh{padding:8px 12px;background:var(--bg2);border-bottom:1px solid var(--line);font-weight:700;font-size:13px;display:flex;align-items:center;gap:8px}
  .runout pre{margin:0;padding:12px 14px;font-family:ui-monospace,monospace;font-size:12.5px;color:#cfe;direction:ltr;text-align:left;max-height:280px;overflow:auto;white-space:pre-wrap}
  .runout .err{color:var(--bad)}
  .runout .ok{color:var(--good)}

  /* Saved */
  .saved-item{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--line);border-radius:13px;padding:14px 16px;margin:10px 0}
  .saved-item .meta{flex:1;min-width:0}
  .saved-item .meta b{display:block;font-size:15px}
  .saved-item .meta span{color:var(--muted);font-size:12.5px}
  .empty{text-align:center;color:var(--muted);padding:50px 20px}
  .empty .big{font-size:52px;margin-bottom:10px}

  /* Playground */
  .pg textarea{width:100%;min-height:220px;background:var(--code-bg);color:#d7e0ff;border:1px solid var(--line);border-radius:12px;padding:14px;font-family:ui-monospace,monospace;font-size:13px;direction:ltr;text-align:left}

  /* Toast */
  #toast{position:fixed;inset-inline:0;bottom:24px;display:flex;justify-content:center;z-index:100;pointer-events:none}
  #toast .t{background:var(--card2);border:1px solid var(--accent);color:var(--text);padding:12px 20px;border-radius:12px;box-shadow:var(--shadow);font-weight:700;opacity:0;transform:translateY(14px);transition:.25s}
  #toast .t.show{opacity:1;transform:translateY(0)}

  footer{border-top:1px solid var(--line);padding:26px 0;text-align:center;color:var(--muted);font-size:13px;margin-top:40px}
  .hidden{display:none !important}
  @media (max-width:560px){
    .hero{padding:30px 0 12px}
    nav.tabs{width:100%;margin-inline-start:0}
    .brand{font-size:18px}
  }
</style>

<header class="appbar">
  <div class="row">
    <div class="brand" onclick="go('home')">
      <div class="logo">🤖</div>
      <div>Script Bot <small id="brandSub">صانع البوتات والسكربتات</small></div>
    </div>
    <nav class="tabs" id="tabs"></nav>
  </div>
</header>

<main id="app" class="container"></main>

<footer>
  <div class="container">
    <div id="footText">Script Bot — يولّد بوتات وسكربتات جاهزة بدون إنترنت وبدون ذكاء اصطناعي.</div>
    <div style="margin-top:6px;opacity:.7">v1.0 · 100% offline · Telegram · WhatsApp · Python · JavaScript</div>
  </div>
</footer>

<div id="toast"></div>

<script>
/* qrcode-generator library (MIT) — Copyright (c) 2009 Kazuhiko Arase — https://github.com/kazuhikoarase/qrcode-generator */

//
// QR Code Generator for JavaScript

// DENSO WAVE INCORPORATED

var qrcode = function() {

  //---------------------------------------------------------------------
  // qrcode
  //---------------------------------------------------------------------

  /**
   * qrcode
   * @param typeNumber 1 to 40
   * @param errorCorrectionLevel 'L','M','Q','H'
   */
  var qrcode = function(typeNumber, errorCorrectionLevel) {

    var PAD0 = 0xEC;
    var PAD1 = 0x11;

    var _typeNumber = typeNumber;
    var _errorCorrectionLevel = QRErrorCorrectionLevel[errorCorrectionLevel];
    var _modules = null;
    var _moduleCount = 0;
    var _dataCache = null;
    var _dataList = [];

    var _this = {};

    var makeImpl = function(test, maskPattern) {

      _moduleCount = _typeNumber * 4 + 17;
      _modules = function(moduleCount) {
        var modules = new Array(moduleCount);
        for (var row = 0; row < moduleCount; row += 1) {
          modules[row] = new Array(moduleCount);
          for (var col = 0; col < moduleCount; col += 1) {
            modules[row][col] = null;
          }
        }
        return modules;
      }(_moduleCount);

      setupPositionProbePattern(0, 0);
      setupPositionProbePattern(_moduleCount - 7, 0);
      setupPositionProbePattern(0, _moduleCount - 7);
      setupPositionAdjustPattern();
      setupTimingPattern();
      setupTypeInfo(test, maskPattern);

      if (_typeNumber >= 7) {
        setupTypeNumber(test);
      }

      if (_dataCache == null) {
        _dataCache = createData(_typeNumber, _errorCorrectionLevel, _dataList);
      }

      mapData(_dataCache, maskPattern);
    };

    var setupPositionProbePattern = function(row, col) {

      for (var r = -1; r <= 7; r += 1) {

        if (row + r <= -1 || _moduleCount <= row + r) continue;

        for (var c = -1; c <= 7; c += 1) {

          if (col + c <= -1 || _moduleCount <= col + c) continue;

          if ( (0 <= r && r <= 6 && (c == 0 || c == 6) )
              || (0 <= c && c <= 6 && (r == 0 || r == 6) )
              || (2 <= r && r <= 4 && 2 <= c && c <= 4) ) {
            _modules[row + r][col + c] = true;
          } else {
            _modules[row + r][col + c] = false;
          }
        }
      }
    };

    var getBestMaskPattern = function() {

      var minLostPoint = 0;
      var pattern = 0;

      for (var i = 0; i < 8; i += 1) {

        makeImpl(true, i);

        var lostPoint = QRUtil.getLostPoint(_this);

        if (i == 0 || minLostPoint > lostPoint) {
          minLostPoint = lostPoint;
          pattern = i;
        }
      }

      return pattern;
    };

    var setupTimingPattern = function() {

      for (var r = 8; r < _moduleCount - 8; r += 1) {
        if (_modules[r][6] != null) {
          continue;
        }
        _modules[r][6] = (r % 2 == 0);
      }

      for (var c = 8; c < _moduleCount - 8; c += 1) {
        if (_modules[6][c] != null) {
          continue;
        }
        _modules[6][c] = (c % 2 == 0);
      }
    };

    var setupPositionAdjustPattern = function() {

      var pos = QRUtil.getPatternPosition(_typeNumber);

      for (var i = 0; i < pos.length; i += 1) {

        for (var j = 0; j < pos.length; j += 1) {

          var row = pos[i];
          var col = pos[j];

          if (_modules[row][col] != null) {
            continue;
          }

          for (var r = -2; r <= 2; r += 1) {

            for (var c = -2; c <= 2; c += 1) {

              if (r == -2 || r == 2 || c == -2 || c == 2
                  || (r == 0 && c == 0) ) {
                _modules[row + r][col + c] = true;
              } else {
                _modules[row + r][col + c] = false;
              }
            }
          }
        }
      }
    };

    var setupTypeNumber = function(test) {

      var bits = QRUtil.getBCHTypeNumber(_typeNumber);

      for (var i = 0; i < 18; i += 1) {
        var mod = (!test && ( (bits >> i) & 1) == 1);
        _modules[Math.floor(i / 3)][i % 3 + _moduleCount - 8 - 3] = mod;
      }

      for (var i = 0; i < 18; i += 1) {
        var mod = (!test && ( (bits >> i) & 1) == 1);
        _modules[i % 3 + _moduleCount - 8 - 3][Math.floor(i / 3)] = mod;
      }
    };

    var setupTypeInfo = function(test, maskPattern) {

      var data = (_errorCorrectionLevel << 3) | maskPattern;
      var bits = QRUtil.getBCHTypeInfo(data);

      // vertical
      for (var i = 0; i < 15; i += 1) {

        var mod = (!test && ( (bits >> i) & 1) == 1);

        if (i < 6) {
          _modules[i][8] = mod;
        } else if (i < 8) {
          _modules[i + 1][8] = mod;
        } else {
          _modules[_moduleCount - 15 + i][8] = mod;
        }
      }

      // horizontal
      for (var i = 0; i < 15; i += 1) {

        var mod = (!test && ( (bits >> i) & 1) == 1);

        if (i < 8) {
          _modules[8][_moduleCount - i - 1] = mod;
        } else if (i < 9) {
          _modules[8][15 - i - 1 + 1] = mod;
        } else {
          _modules[8][15 - i - 1] = mod;
        }
      }

      // fixed module
      _modules[_moduleCount - 8][8] = (!test);
    };

    var mapData = function(data, maskPattern) {

      var inc = -1;
      var row = _moduleCount - 1;
      var bitIndex = 7;
      var byteIndex = 0;
      var maskFunc = QRUtil.getMaskFunction(maskPattern);

      for (var col = _moduleCount - 1; col > 0; col -= 2) {

        if (col == 6) col -= 1;

        while (true) {

          for (var c = 0; c < 2; c += 1) {

            if (_modules[row][col - c] == null) {

              var dark = false;

              if (byteIndex < data.length) {
                dark = ( ( (data[byteIndex] >>> bitIndex) & 1) == 1);
              }

              var mask = maskFunc(row, col - c);

              if (mask) {
                dark = !dark;
              }

              _modules[row][col - c] = dark;
              bitIndex -= 1;

              if (bitIndex == -1) {
                byteIndex += 1;
                bitIndex = 7;
              }
            }
          }

          row += inc;

          if (row < 0 || _moduleCount <= row) {
            row -= inc;
            inc = -inc;
            break;
          }
        }
      }
    };

    var createBytes = function(buffer, rsBlocks) {

      var offset = 0;

      var maxDcCount = 0;
      var maxEcCount = 0;

      var dcdata = new Array(rsBlocks.length);
      var ecdata = new Array(rsBlocks.length);

      for (var r = 0; r < rsBlocks.length; r += 1) {

        var dcCount = rsBlocks[r].dataCount;
        var ecCount = rsBlocks[r].totalCount - dcCount;

        maxDcCount = Math.max(maxDcCount, dcCount);
        maxEcCount = Math.max(maxEcCount, ecCount);

        dcdata[r] = new Array(dcCount);

        for (var i = 0; i < dcdata[r].length; i += 1) {
          dcdata[r][i] = 0xff & buffer.getBuffer()[i + offset];
        }
        offset += dcCount;

        var rsPoly = QRUtil.getErrorCorrectPolynomial(ecCount);
        var rawPoly = qrPolynomial(dcdata[r], rsPoly.getLength() - 1);

        var modPoly = rawPoly.mod(rsPoly);
        ecdata[r] = new Array(rsPoly.getLength() - 1);
        for (var i = 0; i < ecdata[r].length; i += 1) {
          var modIndex = i + modPoly.getLength() - ecdata[r].length;
          ecdata[r][i] = (modIndex >= 0)? modPoly.getAt(modIndex) : 0;
        }
      }

      var totalCodeCount = 0;
      for (var i = 0; i < rsBlocks.length; i += 1) {
        totalCodeCount += rsBlocks[i].totalCount;
      }

      var data = new Array(totalCodeCount);
      var index = 0;

      for (var i = 0; i < maxDcCount; i += 1) {
        for (var r = 0; r < rsBlocks.length; r += 1) {
          if (i < dcdata[r].length) {
            data[index] = dcdata[r][i];
            index += 1;
          }
        }
      }

      for (var i = 0; i < maxEcCount; i += 1) {
        for (var r = 0; r < rsBlocks.length; r += 1) {
          if (i < ecdata[r].length) {
            data[index] = ecdata[r][i];
            index += 1;
          }
        }
      }

      return data;
    };

    var createData = function(typeNumber, errorCorrectionLevel, dataList) {

      var rsBlocks = QRRSBlock.getRSBlocks(typeNumber, errorCorrectionLevel);

      var buffer = qrBitBuffer();

      for (var i = 0; i < dataList.length; i += 1) {
        var data = dataList[i];
        buffer.put(data.getMode(), 4);
        buffer.put(data.getLength(), QRUtil.getLengthInBits(data.getMode(), typeNumber) );
        data.write(buffer);
      }

      // calc num max data.
      var totalDataCount = 0;
      for (var i = 0; i < rsBlocks.length; i += 1) {
        totalDataCount += rsBlocks[i].dataCount;
      }

      if (buffer.getLengthInBits() > totalDataCount * 8) {
        throw 'code length overflow. ('
          + buffer.getLengthInBits()
          + '>'
          + totalDataCount * 8
          + ')';
      }

      // end code
      if (buffer.getLengthInBits() + 4 <= totalDataCount * 8) {
        buffer.put(0, 4);
      }

      // padding
      while (buffer.getLengthInBits() % 8 != 0) {
        buffer.putBit(false);
      }

      // padding
      while (true) {

        if (buffer.getLengthInBits() >= totalDataCount * 8) {
          break;
        }
        buffer.put(PAD0, 8);

        if (buffer.getLengthInBits() >= totalDataCount * 8) {
          break;
        }
        buffer.put(PAD1, 8);
      }

      return createBytes(buffer, rsBlocks);
    };

    _this.addData = function(data, mode) {

/* ============================================================
   CODE GENERATORS
   Convention: return code as a string. Generated code must NOT
   contain backticks (` ) — we use quotes/concatenation instead.
   ============================================================ */
function parsePairs(text, sep){
  sep = sep || '=';
  return String(text||'').split('\n').map(l=>l.trim()).filter(Boolean).map(l=>{
    const i = l.indexOf(sep);
    if(i<0) return [l, ''];
    return [l.slice(0,i).trim(), l.slice(i+1).trim()];
  });
}
function pyDict(pairs){
  return '{\n' + pairs.map(([k,v])=>'    '+JSON.stringify(k)+': '+JSON.stringify(v)).join(',\n') + '\n}';
}
function jsObj(pairs){
  return '{\n' + pairs.map(([k,v])=>'  '+JSON.stringify(k)+': '+JSON.stringify(v)).join(',\n') + '\n}';
}

function genMod(ctx){
  const r=ctx.rnd,o=ctx.opts;
  const words=String(o.banWords||'').split(',').map(s=>s.trim()).filter(Boolean);
  const blockLinks=(o.blockLinks||'yes')==='yes';
  if(ctx.langCode==='python'){
    const c='#';
    return [
banner(c,r,ctx),
'from telegram import Update',
'from telegram.ext import Application, CommandHandler, MessageHandler, filters, ContextTypes',
'',
'TOKEN = '+JSON.stringify(o.token),
'BANNED_WORDS = '+JSON.stringify(words),
'BLOCK_LINKS = '+(blockLinks?'True':'False'),
'',
'async def '+r.handle+'(update: Update, context: ContextTypes.DEFAULT_TYPE):',
'    msg = update.message',
'    text = (msg.text or "").lower()',
'    if BLOCK_LINKS and ("http://" in text or "https://" in text or "t.me/" in text):',
'        await msg.delete()',
'        return',
'    for word in BANNED_WORDS:',
'        if word.lower() in text:',
'            await msg.delete()',
'            return',
'',
'async def ban(update: Update, context: ContextTypes.DEFAULT_TYPE):',
'    if update.message.reply_to_message:',
'        user = update.message.reply_to_message.from_user',
'        await context.bot.ban_chat_member(update.message.chat_id, user.id)',
'        await update.message.reply_text(f"🚫 تم طرد {user.first_name}")',
'',
'async def mute(update: Update, context: ContextTypes.DEFAULT_TYPE):',
'    from telegram import ChatPermissions',
'    if update.message.reply_to_message:',
'        user = update.message.reply_to_message.from_user',
'        await context.bot.restrict_chat_member(update.message.chat_id, user.id, ChatPermissions(can_send_messages=False))',
'        await update.message.reply_text(f"🔇 تم كتم {user.first_name}")',
'',
'def main():',
'    '+r.botv+' = Application.builder().token(TOKEN).build()',
'    '+r.botv+'.add_handler(CommandHandler("ban", ban))',
'    '+r.botv+'.add_handler(CommandHandler("mute", mute))',
'    '+r.botv+'.add_handler(MessageHandler(filters.TEXT & ~filters.COMMAND, '+r.handle+'))',
'    print("Moderation bot is running...")',
'    '+r.botv+'.run_polling()',
'',
'if __name__ == "__main__":',
'    main()'
    ].join('\n');
  }
  const c='//';
  return [
banner(c,r,ctx),
'const TelegramBot = require("node-telegram-bot-api");',
'const TOKEN = '+JSON.stringify(o.token)+';',
'const BANNED_WORDS = '+JSON.stringify(words)+';',
'const BLOCK_LINKS = '+(blockLinks?'true':'false')+';',
'',
'const '+r.botv+' = new TelegramBot(TOKEN, { polling: true });',
'',
r.botv+'.on("message", async (msg) => {',
'  const text = (msg.text || "").toLowerCase();',
'  if (BLOCK_LINKS && /(https?:\\/\\/|t\\.me\\/)/.test(text)) {',
'    return '+r.botv+'.deleteMessage(msg.chat.id, msg.message_id).catch(() => {});',
'  }',
'  if (BANNED_WORDS.some((w) => text.includes(w.toLowerCase()))) {',
'    '+r.botv+'.deleteMessage(msg.chat.id, msg.message_id).catch(() => {});',
'  }',
'});',
'',
r.botv+'.onText(/\\/ban/, (msg) => {',
'  if (!msg.reply_to_message) return;',
'  const u = msg.reply_to_message.from;',
'  '+r.botv+'.banChatMember(msg.chat.id, u.id)',
'    .then(() => '+r.botv+'.sendMessage(msg.chat.id, "🚫 تم طرد " + u.first_name));',
'});',
'',
r.botv+'.onText(/\\/mute/, (msg) => {',
'  if (!msg.reply_to_message) return;',
'  const u = msg.reply_to_message.from;',
'  '+r.botv+'.restrictChatMember(msg.chat.id, u.id, { can_send_messages: false })',
'    .then(() => '+r.botv+'.sendMessage(msg.chat.id, "🔇 تم كتم " + u.first_name));',
'});',
'',
'console.log("Moderation bot is running...");'
  ].join('\n');
}

/* ---- 7. Quiz ---- */
function parseQuiz(text){
  return String(text||'').split('\n').map(l=>l.trim()).filter(Boolean).map(l=>{
    const parts=l.split('|').map(s=>s.trim());
    const q=parts[0]||'';
    const opts=(parts[1]||'').split(',').map(s=>s.trim()).filter(Boolean);
    const correct=parseInt(parts[2])||1;
    return {q,opts,correct};
  });
}

'if __name__ == "__main__":',
'    main()'
    ].join('\n');
  }
  const c='//';
  return [
banner(c,r,ctx),
c+' يحتاج: npm install node-telegram-bot-api pdfkit axios',
'const TelegramBot = require("node-telegram-bot-api");',
'const PDFDocument = require("pdfkit");',
'const axios = require("axios");',
'const fs = require("fs");',
'',
'const TOKEN = '+JSON.stringify(o.token)+';',
'const '+r.botv+' = new TelegramBot(TOKEN, { polling: true });',
'const albums = {};   '+c+' chat_id -> [image buffers]',
'',
r.botv+'.onText(/\\/start/, (msg) => {',
'  '+r.botv+'.sendMessage(msg.chat.id, "🖼️ أرسل الصور ثم /done لإنشاء ملف PDF. /cancel للإلغاء.");',
'});',
'',
r.botv+'.on("photo", async (msg) => {',
'  const chat = msg.chat.id;',
'  const photo = msg.photo[msg.photo.length - 1];',
'  const link = await '+r.botv+'.getFileLink(photo.file_id);',
'  const res = await axios.get(link, { responseType: "arraybuffer" });',
'  (albums[chat] = albums[chat] || []).push(Buffer.from(res.data));',
'  '+r.botv+'.sendMessage(chat, "✅ أُضيفت الصورة (" + albums[chat].length + "). أرسل المزيد أو /done.");',
'});',
'',
r.botv+'.onText(/\\/done/, (msg) => {',
'  const chat = msg.chat.id;',
'  const imgs = albums[chat] || [];',
'  if (!imgs.length) { '+r.botv+'.sendMessage(chat, "لم ترسل أي صورة بعد."); return; }',
'  const pdfPath = "album_" + chat + ".pdf";',
'  const doc = new PDFDocument({ autoFirstPage: false });',
'  const stream = fs.createWriteStream(pdfPath);',
'  doc.pipe(stream);',
'  imgs.forEach((buf) => {',
'    const img = doc.openImage(buf);',
'    doc.addPage({ size: [img.width, img.height] });',
'    doc.image(img, 0, 0);',
'  });',
'  doc.end();',
'  stream.on("finish", async () => {',
'    await '+r.botv+'.sendDocument(chat, pdfPath, {}, { filename: "images.pdf" });',
'    if (fs.existsSync(pdfPath)) fs.unlinkSync(pdfPath);',
'    delete albums[chat];',
'  });',
'});',
'',
r.botv+'.onText(/\\/cancel/, (msg) => {',
'  delete albums[msg.chat.id];',
'  '+r.botv+'.sendMessage(msg.chat.id, "أُلغيت العملية.");',
'});',
'',
'console.log("Image to PDF bot is running...");'
  ].join('\n');
}

  const steps={ar:[],en:[]};

/* ============================================================
   SYNTAX HIGHLIGHTING
   ============================================================ */
function escapeHtml(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
const PY_KW = 'def|class|import|from|return|if|elif|else|for|while|in|and|or|not|is|True|False|None|async|await|with|as|try|except|finally|lambda|pass|break|continue|global|yield|raise|print';
const JS_KW = 'const|let|var|function|return|if|else|for|while|do|switch|case|break|continue|new|this|typeof|instanceof|of|in|async|await|try|catch|finally|throw|class|extends|super|require|module|exports|true|false|null|undefined|console';
function highlight(code, lang){
  const esc = escapeHtml(code);
  let re, kw;
  if(lang==='python'){
    kw = PY_KW;
    re = new RegExp(
      '(#[^\\n]*)' +                                   // 1 comment
      '|("""[\\s\\S]*?"""|\'\'\'[\\s\\S]*?\'\'\'|"(?:\\\\.|[^"\\\\])*"|\'(?:\\\\.|[^\'\\\\])*\')' + // 2 string
      '|\\b(' + kw + ')\\b' +                          // 3 keyword
      '|\\b(\\d+\\.?\\d*)\\b' +                        // 4 number
      '|([A-Za-z_]\\w*)(?=\\s*\\()',                   // 5 function
      'g');
  } else {
    kw = JS_KW;
    re = new RegExp(
      '(\\/\\/[^\\n]*|\\/\\*[\\s\\S]*?\\*\\/)' +       // 1 comment
      '|("(?:\\\\.|[^"\\\\])*"|\'(?:\\\\.|[^\'\\\\])*\')' + // 2 string
      '|\\b(' + kw + ')\\b' +                          // 3 keyword
      '|\\b(\\d+\\.?\\d*)\\b' +                        // 4 number
      '|([A-Za-z_$]\\w*)(?=\\s*\\()',                  // 5 function
      'g');
  }
  return esc.replace(re, function(m, com, str, key, num, fn){
    if(com) return '<span class="tok-com">'+com+'</span>';
    if(str) return '<span class="tok-str">'+str+'</span>';
    if(key) return '<span class="tok-key">'+key+'</span>';
    if(num) return '<span class="tok-num">'+num+'</span>';
    if(fn)  return '<span class="tok-fn">'+fn+'</span>';
    return m;
  });
}

/* ---- Run JS (sandboxed) ---- */
function runJS(code){
  const ro=document.getElementById('runout');
  const pre=document.getElementById('runpre');
  if(!ro||!pre) return;
  ro.classList.remove('hidden');
  pre.textContent=t('running');
  pre.className='';

  const lines=[];
  let done=false;
  const iframe=document.createElement('iframe');
  iframe.style.display='none';
  iframe.sandbox='allow-scripts';
  const runnerId='sbrun_'+Date.now();
  const src =
    '<script>'+
    'var __out=[];'+
    'function post(t,m){parent.postMessage({id:"'+runnerId+'",type:t,msg:m},"*");}'+
    'console.log=function(){post("log",Array.prototype.map.call(arguments,String).join(" "));};'+
    'console.error=function(){post("err",Array.prototype.map.call(arguments,String).join(" "));};'+
    'console.warn=console.log;console.info=console.log;'+
    'try{('+'function(){'+'"use strict";\n'+code.replace(/<\/script>/gi,'<\\/script>')+'\n})();post("done","");}'+
    'catch(e){post("err",String(e));post("done","");}'+
    '<\/script>';
  iframe.srcdoc=src;

  function onMsg(ev){
    if(!ev.data||ev.data.id!==runnerId) return;
    if(ev.data.type==='log') lines.push(ev.data.msg);
    else if(ev.data.type==='err') lines.push('⚠ '+ev.data.msg);
    else if(ev.data.type==='done'){ finish(); }
    if(ev.data.type!=='done'){ pre.textContent = lines.join('\n') || t('no_output'); }
  }
  function finish(){
    if(done) return; done=true;
    window.removeEventListener('message',onMsg);
    pre.textContent = lines.join('\n') || t('no_output');
    setTimeout(()=>{ if(iframe.parentNode) iframe.parentNode.removeChild(iframe); },50);
  }
  window.addEventListener('message',onMsg);
  document.body.appendChild(iframe);
  setTimeout(()=>{ if(!done){ lines.push('⏱ '+t('run_timeout')); finish(); } }, 3500);
}

/* ---- Run Python (Pyodide, lazy-loaded) ---- */
let _pyodidePromise=null;
function pyodideBase(){
  try{ const q=new URLSearchParams(location.search).get('pyodide'); if(q) return q; }catch(e){}
  return 'https://cdn.jsdelivr.net/pyodide/v0.26.4/full/';
}
function loadPyodideOnce(){
  if(_pyodidePromise) return _pyodidePromise;
  const base=pyodideBase();
  _pyodidePromise=new Promise((resolve,reject)=>{
    const s=document.createElement('script');
    s.src=base+'pyodide.js';
    s.onload=async()=>{
      try{ const py=await loadPyodide({indexURL:base}); resolve(py); }
      catch(e){ _pyodidePromise=null; reject(e); }
    };
    s.onerror=()=>{ _pyodidePromise=null; reject(new Error('script load failed')); };
    document.head.appendChild(s);
  });
  return _pyodidePromise;
}
async function runPython(code){
  const ro=document.getElementById('runout');
  const pre=document.getElementById('runpre');
  if(!ro||!pre) return;
  ro.classList.remove('hidden');
  pre.className='';
  pre.textContent=t('py_loading');
  let py;
  try{ py=await loadPyodideOnce(); }
  catch(e){ pre.className='err'; pre.textContent=t('py_fail'); return; }
  const lines=[];
  const flush=()=>{ pre.textContent=lines.join('\n')||t('no_output'); };
  try{ py.setStdout({batched:s=>{ lines.push(s); flush(); }}); }catch(e){}
  try{ py.setStderr({batched:s=>{ lines.push('⚠ '+s); flush(); }}); }catch(e){}
  pre.textContent='';
  try{
    await py.runPythonAsync(code);
    if(!lines.length){ pre.textContent=t('no_output'); }
  }catch(e){
    lines.push(String(e && e.message ? e.message : e));
    flush();
  }
}

  const seg=el('div',{class:'seg'});
  const ta=el('textarea',{id:'pgcode'});
  const defaults={javascript:t('play_ph'), python:t('play_ph_py')};
  function setLang(lc){
    const prev=_pgLang;
    _pgLang=lc; sessionStorage.setItem('sb_pglang',lc);
    // if editor holds the other language's default (or is empty), swap to this language's default
    const cur=(ta.value||'').trim();
    if(!cur || cur===defaults.javascript.trim() || cur===defaults.python.trim()){
      ta.value=defaults[lc]; sessionStorage.setItem('sb_pg_'+lc, ta.value);
    } else if(prev!==lc){
      ta.value = sessionStorage.getItem('sb_pg_'+lc) || defaults[lc];
    }
    [...seg.children].forEach(b=> b.classList.toggle('active', b.dataset.lc===lc));
  }
  [['javascript','🟨 JavaScript'],['python','🐍 Python']].forEach(([lc,label])=>{
    const b=el('button',{}, label); b.dataset.lc=lc; b.onclick=()=>setLang(lc); seg.appendChild(b);
  });
  langField.appendChild(seg);
  panel.appendChild(langField);

  ta.value = sessionStorage.getItem('sb_pg_'+_pgLang) || defaults[_pgLang];
  ta.oninput=()=>sessionStorage.setItem('sb_pg_'+_pgLang, ta.value);
  panel.appendChild(ta);

  const actions=el('div',{class:'actions'});
  const run=el('button',{class:'btn'}, t('play_run'));
  run.onclick=()=>{ if(_pgLang==='python') runPython(ta.value); else runJS(ta.value); };
  const clr=el('button',{class:'btn ghost'}, t('play_clear'));
  clr.onclick=()=>{ ta.value=''; sessionStorage.setItem('sb_pg_'+_pgLang,''); const ro=document.getElementById('runout'); if(ro)ro.classList.add('hidden'); };
  actions.appendChild(run); actions.appendChild(clr);
  panel.appendChild(actions);

  // output container (shared by runJS/runPython via #runout / #runpre)
  const ro=el('div',{class:'runout hidden',id:'runout'});
  ro.appendChild(el('div',{class:'rh'}, '🖥️ '+t('run_h')));
  ro.appendChild(el('pre',{id:'runpre'},''));
  panel.appendChild(ro);

  app.appendChild(panel);
  // reflect active language button
  [...seg.children].forEach(b=> b.classList.toggle('active', b.dataset.lc===_pgLang));
}

/* ---- QR generator ---- */
function renderQR(){
  const panel=el('div',{class:'panel'});
  panel.appendChild(el('h2',{}, '🔳 '+t('qr_h')));
  panel.appendChild(el('p',{class:'sub'}, t('qr_p')));
  const field=el('div',{class:'field'});
  field.appendChild(el('label',{}, t('qr_label')));
  const input=el('input',{type:'text'}); input.value=sessionStorage.getItem('sb_qr')||t('qr_ph');
  input.oninput=()=>sessionStorage.setItem('sb_qr',input.value);
  field.appendChild(input);
  panel.appendChild(field);
  const actions=el('div',{class:'actions'});
  const mk=el('button',{class:'btn'}, t('qr_make'));
  const dl=el('button',{class:'btn ghost'}, t('qr_dl'));
  actions.appendChild(mk); actions.appendChild(dl);
  panel.appendChild(actions);
  const holder=el('div',{style:'margin-top:18px;display:flex;justify-content:center'});
  const canvas=el('canvas',{id:'qrcanvas'}); canvas.style.maxWidth='100%'; canvas.style.borderRadius='14px';
  holder.appendChild(canvas);
  panel.appendChild(holder);
  panel.appendChild(el('div',{class:'note',style:'margin-top:16px'}, t('qr_hint_wa')));
  app.appendChild(panel);

  function draw(){
    const text=(input.value||'').trim();
    const ctx=canvas.getContext('2d');
    if(!text){ canvas.width=canvas.height=0; toast(t('qr_empty')); return; }
    try{
      qrcode.stringToBytes = qrcode.stringToBytesFuncs['UTF-8'];
      const qr=qrcode(0,'M'); qr.addData(text); qr.make();
      const n=qr.getModuleCount(), scale=8, pad=4*scale, size=n*scale+pad*2;
      canvas.width=size; canvas.height=size;
      ctx.fillStyle='#ffffff'; ctx.fillRect(0,0,size,size);
      ctx.fillStyle='#0b1020';
      for(let row=0;row<n;row++) for(let col=0;col<n;col++) if(qr.isDark(row,col))
        ctx.fillRect(pad+col*scale, pad+row*scale, scale, scale);
    }catch(e){ toast(String(e.message||e)); }
  }
  mk.onclick=draw;
  dl.onclick=()=>{ if(!canvas.width){ toast(t('qr_empty')); return; } const a=document.createElement('a'); a.href=canvas.toDataURL('image/png'); a.download='qrcode.png'; a.click(); };
  draw();
}

/* ---- ZIP export (STORED, pure JS, no libs) ---- */
function crc32(bytes){
  let c, crc=0xFFFFFFFF;
  for(let i=0;i<bytes.length;i++){
    c=(crc ^ bytes[i]) & 0xFF;
    for(let k=0;k<8;k++) c = (c & 1) ? (0xEDB88320 ^ (c>>>1)) : (c>>>1);
    crc = (crc>>>8) ^ c;
  }
  return (crc ^ 0xFFFFFFFF) >>> 0;
}
function makeZip(files){
  const enc=new TextEncoder();
  const chunks=[], central=[]; let offset=0;
  const u16=v=>[v&0xFF,(v>>8)&0xFF];
  const u32=v=>[v&0xFF,(v>>8)&0xFF,(v>>16)&0xFF,(v>>24)&0xFF];
  files.forEach(f=>{
    const nameBytes=enc.encode(f.name);
    const data=enc.encode(f.content);
    const crc=crc32(data);
    const local=[].concat(u32(0x04034b50),u16(20),u16(0),u16(0),u16(0),u16(0),
      u32(crc),u32(data.length),u32(data.length),u16(nameBytes.length),u16(0));
    chunks.push(new Uint8Array(local), nameBytes, data);
    const cen=[].concat(u32(0x02014b50),u16(20),u16(20),u16(0),u16(0),u16(0),u16(0),
      u32(crc),u32(data.length),u32(data.length),u16(nameBytes.length),u16(0),u16(0),u16(0),u16(0),u32(0),u32(offset));
    central.push(new Uint8Array(cen), nameBytes);
    offset += local.length + nameBytes.length + data.length;
  });
  let cenSize=0; central.forEach(c=>cenSize+=c.length);
  const end=new Uint8Array([].concat(u32(0x06054b50),u16(0),u16(0),u16(files.length),u16(files.length),
    u32(cenSize),u32(offset),u16(0)));
  const all=[...chunks,...central,end];
  let total=0; all.forEach(a=>total+=a.length);
  const out=new Uint8Array(total); let p=0;
  all.forEach(a=>{ out.set(a,p); p+=a.length; });
  return new Blob([out],{type:'application/zip'});
}
function exportZip(){
  const steps=buildExplain(state._ctx||currentCtx());
  const readme = 'Script Bot — '+L(state.tpl.title)+'\n'+
    '='.repeat(40)+'\n\n'+
    (state.lang==='ar'?'التعليمات:\n':'Instructions:\n')+
    steps[state.lang].map((s,i)=>(i+1)+'. '+s.replace(/<[^>]+>/g,'')).join('\n')+'\n';
  const blob=makeZip([{name:state.fname,content:state.code},{name:'README.txt',content:readme}]);
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download=(state.tpl.id||'project')+'.zip'; document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
  toast(t('zip_ok'));
}

/* ---- Saved ---- */
function renderSaved(){
  const panel=el('div',{class:'panel'});
  panel.appendChild(el('h2',{}, '💾 '+t('saved_h')));
  const list=store.projects;
  if(!list.length){
    const empty=el('div',{class:'empty'});
    empty.appendChild(el('div',{class:'big'},'📭'));
    empty.appendChild(el('p',{},t('saved_empty')));
    panel.appendChild(empty);
    app.appendChild(panel); return;
  }
  list.forEach(pr=>{
    const item=el('div',{class:'saved-item'});
    const icon = TEMPLATES.find(x=>x.id===pr.tplId);
    item.appendChild(el('div',{style:'font-size:26px'}, icon?icon.icon:'📄'));
    const meta=el('div',{class:'meta'});
    meta.appendChild(el('b',{}, pr.title||t('unnamed')));
    const plabel = pr.platform==='telegram'?'Telegram':pr.platform==='whatsapp'?'WhatsApp':(state.lang==='ar'?'سكربت':'Script');
    meta.appendChild(el('span',{}, plabel+' · '+(pr.langCode==='python'?'Python':'JavaScript')+' · '+pr.fname+' · '+new Date(pr.date).toLocaleDateString()));
    item.appendChild(meta);
    const openB=el('button',{class:'btn small'}, t('open')); openB.onclick=()=>openSaved(pr);
    const delB=el('button',{class:'btn small ghost'}, t('del')); delB.onclick=()=>{ if(confirm(t('confirm_del'))){ store.projects=store.projects.filter(x=>x.id!==pr.id); toast(t('del_ok')); render(); } };
    item.appendChild(openB); item.appendChild(delB);
    panel.appendChild(item);
  });
  app.appendChild(panel);
}
function openSaved(pr){
  const tp=TEMPLATES.find(x=>x.id===pr.tplId);
  if(tp){ state.tpl=tp; }
  state.platform=pr.platform; state.langCode=pr.langCode; state.fname=pr.fname; state.code=pr.code;
  state._ctx={ tpl:tp||{title:{ar:pr.title,en:pr.title},desc:{ar:'',en:''},id:pr.tplId}, platform:pr.platform, langCode:pr.langCode, opts:{token:'TOKEN'}, fname:pr.fname };
  go('build'); scrollToResult();
}

/* ---- Toast ---- */
let toastTimer=null;
function toast(msg){
  const box=document.getElementById('toast');
  box.innerHTML='';
  const t=el('div',{class:'t'},msg);
  box.appendChild(t);
  requestAnimationFrame(()=>t.classList.add('show'));
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>{ t.classList.remove('show'); },1800);
}

/* ---- Boot ---- */
render();
</script>
